  <h1>Théorie du Signe</h1>
  <p>Jakobson saw beyond the simple view of language as a bound bundle. Under the blind, brute phoneme lies a dyadic structure that grounds all words, all meaning, language. This dyadic structure is what is called distinctive features.</p>
